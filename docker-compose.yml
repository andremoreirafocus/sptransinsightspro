services:
  minio:
    image:  quay.io/minio/minio:${MINIO_VERSION}
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_NOTIFY_KAFKA_ENABLE_EventKafka: "on"
      MINIO_NOTIFY_KAFKA_TOPIC_EventKafka: "sink-products"
      MINIO_NOTIFY_KAFKA_QUEUE_LIMIT_EventKafka: "10000"
      MINIO_NOTIFY_KAFKA_TLS_EventKafka: "off"
    command: server --console-address ":9001" /data
    networks:
       rede_fia:  
  airflow_webserver:
    image: apache/airflow:2.8.4-python3.11
    container_name: airflow_webserver
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '${FERNET_KEY:-LBi3PfqopCGRKZlFz2mXEjOCgxBtYy7q_Q3vF3rcUeA=}'
      AIRFLOW__WEBSERVER__SECRET_KEY: '${FERNET_KEY:-LBi3PfqopCGRKZlFz2mXEjOCgxBtYy7q_Q3vF3rcUeA2}'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'True'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/requirements.txt:/requirements.txt
      - ./airflow/variables_and_connections:/opt/airflow/variables_and_connections
    ports:
      - "8080:8080"
    depends_on:
      - airflow_postgres
    networks: 
      - rede_fia  
    command: >
      bash -c "pip install -r /requirements.txt && airflow db init && airflow webserver"

  airflow_scheduler:
    image: apache/airflow:2.8.4-python3.11
    restart: always
    container_name: airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '${FERNET_KEY:-LBi3PfqopCGRKZlFz2mXEjOCgxBtYy7q_Q3vF3rcUeA=}'
      AIRFLOW__WEBSERVER__SECRET_KEY: '${FERNET_KEY:-LBi3PfqopCGRKZlFz2mXEjOCgxBtYy7q_Q3vF3rcUeA2}'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/requirements.txt:/requirements.txt
      - ./airflow/variables_and_connections:/opt/airflow/variables_and_connections
    depends_on:
      - airflow_postgres
    networks:
      - rede_fia
    command: >
      bash -c "pip install -r /requirements.txt && airflow scheduler"

  airflow_postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - rede_fia

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: postgres
    ports:
      - 5532:5432
    environment:
      - POSTGRES_USER=${POSTGRES_DB_USER}
      - POSTGRES_PASSWORD=${POSTGRES_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c shared_preload_libraries='pg_partman_bgw'
    networks:
      - rede_fia

  extractloadlivedata:
    build:
      context: extractloadlivedata
      dockerfile: Dockerfile
    container_name: extractloadlivedata
    depends_on:
      - minio
    env_file:
      - ./extractloadlivedata/.env
    environment:
      TOKEN: ${EXTRACTLOADLIVEDATA_TOKEN}
      ACCESS_KEY: ${MINIO_PLATFORM_ACCESS_KEY}
      SECRET_KEY: ${MINIO_PLATFORM_SECRET_KEY}
      DB_USER: ${EXTRACTLOADLIVEDATA_DB_USER}
      DB_PASSWORD: ${EXTRACTLOADLIVEDATA_DB_PASSWORD}
      AIRFLOW_USER: ${EXTRACTLOADLIVEDATA_AIRFLOW_USER}
      AIRFLOW_PASSWORD: ${EXTRACTLOADLIVEDATA_AIRFLOW_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      AIRFLOW_WEBSERVER: airflow_webserver
      DB_HOST: airflow_postgres
      INGEST_BUFFER_PATH: /app/data/staging
      INVOKATIONS_CACHE_DIR: /app/data/.diskcache_pending_invocations
      PROCESSING_REQUESTS_CACHE_DIR: /app/data/.diskcache_pending_processing_requests
      NOTIFICATIONS_WEBHOOK_URL: ${EXTRACTLOADLIVEDATA_NOTIFICATIONS_WEBHOOK_URL}
    volumes:
      - ./ingest_buffer:/app/data/staging
      - ./.diskcache_pending_invocations:/app/data/.diskcache_pending_invocations
      - ./.diskcache_pending_processing_requests:/app/data/.diskcache_pending_processing_requests
    networks:
      - rede_fia
    restart: always

  jupyter:
    build: 
      context: jupyter
      dockerfile: Dockerfile    
    container_name: jupyter_exploration
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=bus_analytics  # Use a secure token in production
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    networks:
      - rede_fia

  alertservice:
    build:
      context: ./alertservice
      dockerfile: Dockerfile
    container_name: alertservice
    ports:
      - "8000:8000"
    environment:
      SMTP_HOST: sandbox.smtp.mailtrap.io
      SMTP_PORT: "587"
      SMTP_USER: ${ALERTSERVICE_SMTP_USER}
      SMTP_PASSWORD: ${ALERTSERVICE_SMTP_PASSWORD}
      SMTP_USE_TLS: "true"
      EMAIL_FROM: andre.moreira.engineer@gmail.com
      EMAIL_TO: andremoreira.focus@gmail.com
      EMAIL_SUBJECT_PREFIX: "[DQ] status update for pipeline"
    volumes:
      - alertservice_data:/app/storage
    networks:
      - rede_fia
    restart: always

networks:
  rede_fia:
    driver: bridge

volumes:
  minio_storage: {}
  postgres_data: {}
  airflow_db_data: {}
  ingest_buffer: {}
  diskcache_pending_invocations: {}
  diskcache_pending_processing_requests: {}
  alertservice_data: {}
