server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      service: extractloadlivedata

scrape_configs:
  - job_name: extractloadlivedata
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/extractloadlivedata"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        regex: "/extractloadlivedata"
        target_label: service
        replacement: extractloadlivedata
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
    pipeline_stages:
      - docker: {}
      - static_labels:
          source: docker
      - json:
          expressions:
            timestamp: timestamp
            level: level
            service: service
            component: component
            event: event
            status: status
            execution_id: execution_id
            correlation_id: correlation_id
